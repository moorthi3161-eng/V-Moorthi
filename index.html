<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First GitHub Pages Site</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            padding: 100px 20px;
            margin: 0;
        }
        h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.5rem;
            max-width: 600px;
            margin: 0 auto 30px;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <h1>Hello World! 🌍</h1>
    <p>This is my first static website hosted for free on <strong>GitHub Pages</strong> using Git.</p>
    <p>Made with ❤️ by 3161_V_Moorthi</p>
    <a href="https://github.com/yourusername/yourusername.github.io" class="btn" target="_blank">
        View Source on GitHub
    </a>
</body>
</html>
